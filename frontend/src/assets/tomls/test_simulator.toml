characters = """
- 酒馆老板「老马」：一个健壮的中年人，性格豪爽，消息灵通。
- 冒险者公会接待员「莉娜」：年轻的精灵女性，态度友善但公事公办。
- 神秘旅人「灰袍」：总是坐在酒馆角落的蒙面人，身份不明。
"""
behaviors = "NPC 应当有自己的性格和动机，不会无条件服从玩家。战斗描写应当紧张刺激。"
