universeName = "幻想大陆"
literalWorkName = "幻想大陆物语"
prologue = "在遥远的幻想大陆上，魔法与剑术并存。你是一名初出茅庐的冒险者，刚刚抵达边境小镇「晨曦镇」。"

language = "zh_CN"

[statusBar]
