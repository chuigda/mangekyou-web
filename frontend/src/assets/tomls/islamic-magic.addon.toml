# type: addon

[simulator]
world = """
<addon id="islamic">
Perso-Arabic and Islamic magical traditions. The following systems are canonical.

Core distinction: licit magic (ruhaniyya) invokes God's names/Quran; illicit magic (sihr, سِحْر) relies on pleasing demons through sin. Sihr causes marital separation, illness, madness — but only by God's leave.

Harut & Marut (هاروت وماروت, 哈鲁特和马鲁特): Two angels sent to test humanity. They fell for a woman (Zohra/Venus), sinned, killed a witness. Chose earthly punishment — suspended upside-down in a Babylonian well, teaching magic to seekers while warning it is a test.

Jinn (جِنّ): Beings of "smokeless fire" (无烟之火); invisible, rational, morally accountable. Shapeshift into snakes/scorpions/lizards. Can possess humans, cause illness. Fear iron; repelled by God's names. Inhabit ruins and desolate places. Some serve as familiars (muwakkal) to sorcerers.
- Hierarchy: ordinary jinn, ifrit (powerful/cunning), marid (rebellious giants), silat (shapeshifting females). Qareen = personal jinn companion from birth.
- Seven Kings of the Jinn: tied to 7 weekdays and 7 planets. Invoked for magic squares/talismans.

Talismanic Magic (Ilm al-Tilasm):
- 99 Names of God (al-Asma al-Husna): each has esoteric properties; inscribed/recited for healing, protection, love, authority.
- Magic Squares (wafq/awfaq): numerical grids summing equally in all directions; each tied to a planet.
- Talismanic Shirts (qamis al-tilasm): garments inscribed with Quran, divine names, squares, astrology; grant invulnerability.
- Seal of Solomon (Khatam Sulayman, 素莱曼之印): hexagram/pentagram for dominion over jinn.
- Tawiz (تعويذ): leather-enclosed Quranic inscriptions with separated letters for enhanced potency.

Divination (Ilm al-Ghayb):
- Astrology (ilm al-nujum): celestial influences on earthly events.
- Geomancy (ilm al-raml): sand-pattern divination producing 16 interpretive figures.
- Letter-number mysticism (ilm al-huruf/jafr): Arabic letters = numbers; used for prophecy, talismans.
- Bibliomancy (istikhara): random Quran opening for guidance.
- Spirit summoning (istinzal): conjuring celestial spirits.

Occult Sciences (al-Ulum al-Ghayba):
- Simiya: science of divine names/letters — highest licit magic, manipulates reality through sacred words.
- Limiya: illusion magic — sensory deception without altering reality.
- Himiya: subjugation of celestial spirits and planetary intelligences.
- Rimiya: sleight of hand — lowest form.
- Kimiya (Alchemy): transmutation of metals + spiritual purification; elemental balance theory and elixir of life.
- Taskhirat: commanding/subjugating jinn and spirits.

Ruqyah (رقية) — licit counter-magic/exorcism: healing via Quranic recitation and God's names. Key verses: Ayat al-Kursi, Surat al-Falaq, Surat al-Nas. Process: tazeem (negotiating with possessing spirit), commanding it to curse Satan (satanic spirits refuse), converting jinn to Islam. May employ muwakkal (allied good jinn).

Barakah (بركة): divine blessing flowing through saints, Sufi masters, sacred objects/places. Enables miracles (karamat) — distinct from sihr because karamat come from God.

Evil Eye (al-Ayn/Nazar): caused by envious gazes; brings illness/misfortune/death. Protection: Quranic recitation, blue eye amulets (nazar boncugu), Hand of Fatima (Khamsa), divine name inscriptions.

Sufi Practices: Dhikr (chanting divine names for altered consciousness), Khalwa (isolation retreat), Muraqaba (meditation), Hadra (trance dance), dream interpretation (tabir al-ruya).

Licit vs. Illicit:
- Halal: ruqyah, Quranic talismans, barakah, istikhara — power from God.
- Haram: sihr, conjuring devils, fortune-telling (kahana), magic requiring sin or shirk.
- Disputed: astrology, geomancy, some talismanic magic.
</addon>
"""
