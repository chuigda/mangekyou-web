# type: addon
name = "烦人的考试"

[simulator]
world = """
<addon id="exams">
Exams and grading

[End-of-year exams / 期末考试]
- Held in June for Years 1–4 and Year 6.
- Typically include a written theory paper and a practical examination for each subject.
- Results use the standard wizarding grading scale.
- Exam performance affects skill XP gains at year-end.
- Exam XP rewards: passing an end-of-year exam grants 10–30 bonus XP to the corresponding skill (scaled by grade). Failing an exam grants 0–5 XP.

[OWLs — Ordinary Wizarding Levels / 普通巫术等级考试]
- Taken at the end of Year 5. Administered by the Wizarding Examinations Authority(巫师考试管理局).
- OWL results determine which NEWT-level classes a student may continue in Year 6–7; each professor sets their own minimum OWL grade for admission.
- OWLs are a major narrative event — the simulator should depict the exam period with appropriate tension, revision sessions, and results delivery by owl post during summer.
- OWL XP rewards: 20–50 bonus XP to the corresponding skill (scaled by grade).

[NEWTs — Nastily Exhausting Wizarding Tests / 超级疲劳轰炸式巫术测试]
- Taken at the end of Year 7. The highest standard of wizarding qualification; results are critical for career prospects.
- NEWT subjects are chosen based on OWL results and career aspirations.
- Like OWLs, NEWTs are administered by the Wizarding Examinations Authority.
- NEWT XP rewards: 20–50 bonus XP to the corresponding skill (scaled by grade).

[WOMBATs — Wizards' Ordinary Magic and Basic Aptitude Tests / 巫师普通魔法与基本能力测试]
- A standardised wizarding aptitude test open to ALL — witches, wizards, AND Muggles.
- Administered by the Wizarding Examinations Authority. Unlike OWLs and NEWTs, WOMBATs are not tied to Hogwarts coursework and can be taken independently.
- WOMBATs test general magical knowledge, ethical reasoning, creature identification, and situational judgement rather than practical spellcasting. This is precisely why Muggles are eligible.
- Three difficulty tiers: WOMBAT Grade 1 (basic), Grade 2 (intermediate), Grade 3 (advanced). Each grade is a separate exam that can be attempted independently.
- Results use the same O/E/A/P/D/T grading scale.
- WOMBATs do NOT grant skill XP (they test knowledge breadth, not spellcasting proficiency). However, achieving high WOMBAT grades increases fame by 10–30 per grade passed.
- Narrative note: WOMBATs are occasionally referenced in the Daily Prophet and are a point of pride for intellectually inclined characters. Hermione-type NPCs may bring them up enthusiastically.

[Grading scale]
Used for OWLs, NEWTs, WOMBATs, and end-of-year exams:
- Passing grades: O (Outstanding / 杰出), E (Exceeds Expectations / 超出期望), A (Acceptable / 及格).
- Failing grades: P (Poor / 差), D (Dreadful / 糟糕透顶), T (Troll / 巨怪).

</addon>
"""
