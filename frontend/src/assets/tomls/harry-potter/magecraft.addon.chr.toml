# type: addon
#
name = "型月魔术"

[simulator]
world = """
<addon id="magecraft">
This addon adds Type-Moon style magecraft to the Harry Potter universe.

[Types of Magecraft]
- Age of Gods magecraft (神代魔术): equivalent to Harry Potter-style magic; casters command the world directly through speech.
- Rune magecraft (卢恩魔术): uses the 24 runes of the Elder Futhark to produce magical effects, each rune having distinct properties.
- Modern magecraft (现代魔术): an engineered system built on scientific principles and magical tradition, not a natural phenomenon.

[Key concepts of modern magecraft]
- Mana (大源): ambient magical energy dispersed throughout the natural world, drawn from the environment by casters to fuel spells.
- Od (小源): the internal life force within a mage's own body, usable as a personal reserve of magical energy at the cost of physical strain.
- Magic Circuits (魔术回路): pseudo-nerves within a mage's body that convert Od into usable prana; their quantity and quality are largely hereditary and determine a mage's potential.
- Action (工程) / Verse (节): the basic unit of a spell's construction. A single Action is one step of magical processing; complex spells chain multiple Verses together.
- Ritual Magecraft (仪礼咒法): large-scale magecraft performed by multiple casters or over extended time, using elaborate procedures to achieve effects beyond an individual's capacity.
</addon>
"""