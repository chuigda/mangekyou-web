# type: addon
name = "精品神药"

[simulator]
world = """
<addon id="psychotropics">
Muggle psychotropic medications and their interactions with magical ability. These effects are canonical in this simulation.

Core principle: Muggle psychotropic drugs alter the neurochemical substrate that wizards rely on for intent, focus, and emotional channelling — the three pillars of spellcasting. The magical community is largely ignorant of these substances; Muggle-born or half-blood wizards occasionally encounter them through Muggle relatives or Muggle-side healthcare.

The Ministry classifies psychotropic medications as "Muggle Artefacts of Cognitive Concern" — not banned, but not understood. St Mungo's has no department for them. Madam Pomfrey will frown and refer you to a Muggle doctor.

[SSRIs — Selective Serotonin Reuptake Inhibitors / 选择性5-羟色胺再摄取抑制剂]
Examples: fluoxetine (百忧解), sertraline (舍曲林), escitalopram (艾司西酞普兰).
Mechanism: Increase serotonin availability in synaptic clefts.
Magical effects:
- Emotional blunting reduces the intensity of Patronus casting. A wizard on SSRIs may produce a dimmer, less corporeal Patronus — not from lack of happy memories, but from dampened emotional access to them.
- Jinxes and hexes that rely on aggressive intent (Stinging Jinx, Bat-Bogey Hex) lose 10–30% potency.
- Defensive magic (Protego, Shield Charm) is largely unaffected — these rely more on focus than emotion.
- Onset: effects manifest 2–4 weeks after starting, mirroring Muggle pharmacokinetics.
- Withdrawal: abrupt cessation causes "brain zaps" that can trigger involuntary spell discharge — wands may spark or emit random minor jinxes.

[Benzodiazepines / 苯二氮䓬类]
Examples: diazepam (安定 / 地西泮), alprazolam (阿普唑仑), clonazepam (氯硝西泮).
Mechanism: Enhance GABA-A receptor activity, producing sedation and anxiolysis.
Magical effects:
- Significantly impair wand precision. Fine motor spellwork (Transfiguration, delicate Charms) suffers most — expect misfires, partial transformations, and wobbly levitation.
- Reduce Occlumency barriers. A Legilimens attacking a wizard on benzodiazepines finds the mental defences "soft" — like pushing through fog rather than walls.
- Paradoxically improve Divination in susceptible individuals — the loosened cognitive control allows prophetic impressions to surface more easily.
- High doses cause magical sedation: the wizard can still cast, but spells emerge sluggish, as if underwater.
- Tolerance builds rapidly. Chronic users regain baseline casting ability but become dependent — withdrawal causes rebound anxiety severe enough to destabilise Apparition (risk of splinching increases 3×).

[Atypical Antipsychotics / 非典型抗精神病药]
Examples: quetiapine (喹硫平), olanzapine (奥氮平), risperidone (利培酮).
Mechanism: Block dopamine D2 and serotonin 5-HT2A receptors.
Magical effects:
- Suppress the "magical ideation" channel. Wizards on antipsychotics report that magic feels "mechanical" — they can cast, but lose the intuitive sense of magical flow.
- Unforgivable Curses become significantly harder to cast. The Imperius Curse requires sadistic intent that antipsychotics flatten; Cruciatus requires sustained malice. This is arguably a benefit.
- Metamorphmagus abilities are dampened — shifts become slower, less vivid, and harder to sustain.
- Weight gain side effect is not mitigated by magic. Potions interact unpredictably with dopamine blockade.
- Quetiapine at low doses (Muggle sleep aid use) causes next-morning casting fog — spells cast before 10 AM are unreliable.

[Stimulants / 中枢兴奋剂]
Examples: methylphenidate (利他林/哌甲酯), amphetamine (安非他命), modafinil (莫达非尼).
Mechanism: Increase dopamine and norepinephrine availability.
Magical effects:
- Dramatically sharpen spell precision and reduce casting time. A wizard on stimulants can chain spells faster and with tighter aim.
- However, overcasting becomes a serious risk — the wizard feels capable of sustained duelling but depletes magical reserves without noticing fatigue.
- Heightened focus improves Occlumency but makes Legilimency harder — the mind becomes a bright, noisy searchlight rather than a subtle probe.
- Chronic use causes "magical jitter" — micro-tremors in wand movements that accumulate into spell drift over long casting sessions.
- Crash phase: when the stimulant wears off, magical ability drops below baseline for 2–4 hours. Dangerous in combat.
- Highly sought after before OWL and NEWT exams. Hogwarts has no official policy because the staff doesn't know what methylphenidate is.

[Adderall & ADHD Medications / 阿德拉尔与 ADHD 药物]
Examples: Adderall (阿德拉尔, mixed amphetamine salts), Vyvanse (利斯德安非他命/赖右苯丙胺), atomoxetine (托莫西汀, non-stimulant).
Note: Technically a subset of stimulants, but deserves special mention due to its prevalence among Muggle-born Hogwarts students and its unique interaction with ADHD-type magical profiles.
Mechanism: Adderall/Vyvanse increase dopamine and norepinephrine; atomoxetine selectively inhibits norepinephrine reuptake.
Context: Wizards with ADHD-type neurology often exhibit "scatter-magic" — bursts of powerful accidental magic interspersed with inability to sustain deliberate casting. Muggle-born students diagnosed before age 11 may arrive at Hogwarts already medicated.
Magical effects:
- For ADHD wizards specifically, Adderall is transformative: it converts erratic scatter-magic into reliable, focused casting. A scatter-magic student on Adderall can finally complete a full Transfiguration sequence without the mouse sprouting feathers halfway through.
- Neurotypical wizards using Adderall as a "聪明药" (smart drug) get the general stimulant benefits (faster casting, sharper aim) but at steeper cost — tolerance builds faster, crash is harsher, and dependency risk is higher because they lack the dopamine deficit that ADHD wizards have.
- Vyvanse (prodrug, slower onset) is preferred by students who need all-day coverage — one dose before breakfast carries through to evening Astronomy class. Smoother magical output curve, less "jitter" than Adderall IR.
- Atomoxetine (non-stimulant): gentler effect, no euphoria, no crash. Improves sustained attention for long rituals and potion-brewing but doesn't boost raw casting speed. Takes 4–6 weeks to reach full effect. The "boring but reliable" option.
- Adderall abuse peaks during OWL/NEWT season. Muggle-born students sometimes sell pills to pureblood classmates who have never heard of amphetamines. Snape would confiscate them if he knew what they were; instead he just notices certain students are "suspiciously alert" in June.
- Combining Adderall with Wit-Sharpening Potion is the holy grail of exam cheating — doubled cognitive enhancement, but risks serotonin-adjacent magical overload: nosebleeds, hand tremors, and in one documented case, a student who could temporarily read Ancient Runes fluently but forgot how to speak English for six hours.

[Mood Stabilisers / 心境稳定剂]
Examples: lithium (锂盐), valproate (丙戊酸), lamotrigine (拉莫三嗪).
Mechanism: Modulate ion channels and intracellular signalling cascades.
Magical effects:
- Lithium interferes with magical conductivity at a fundamental level. Wand cores containing phoenix feather are especially sensitive — the feather's resonance frequency shifts, causing a subtle but persistent "off-key" feeling when casting.
- Stabilise wild magic surges in wizards with bipolar-spectrum conditions. Without medication, manic episodes can produce uncontrolled accidental magic (exploding objects, spontaneous Apparition, involuntary Legilimency). Lithium smooths these peaks.
- Valproate has minimal magical interaction but causes drowsiness that slows reaction time in duels.
- Lamotrigine is considered the most "magic-compatible" mood stabiliser — minimal cognitive dulling, no wand interference. Muggle-born wizards in the know prefer it.
- Lithium requires blood level monitoring. Magical healing (Episkey, etc.) does not affect lithium levels, but certain potions (especially those containing mercury or antimony) can cause lithium toxicity.

[Psychedelics & Dissociatives / 致幻剂与解离剂]
Examples: psilocybin (裸盖菇素), LSD (麦角酸二乙胺), ketamine (氯胺酮).
Note: These are not prescribed in standard Muggle psychiatry (with emerging exceptions for ketamine/psilocybin), but are encountered recreationally.
Magical effects:
- Psilocybin massively amplifies magical perception. The wizard can "see" magical auras, ley lines, and enchantment residues normally invisible. However, wand control becomes erratic — attempting to cast while tripping is like trying to write calligraphy on a rollercoaster.
- LSD causes spell synaesthesia — the wizard hears colours of spells, sees the sound of incantations. Creatively inspiring but tactically useless.
- Ketamine at sub-anaesthetic doses produces a dissociative state where the wizard's consciousness partially separates from their body. This mimics a crude form of Astral Projection but without the safety mechanisms — the wizard cannot reliably return and may leave their body vulnerable.
- All psychedelics temporarily dissolve Occlumency barriers completely. A Legilimens encountering a tripping wizard gets an overwhelming flood of unfiltered consciousness — often unpleasant for both parties.

[Methorphans — the Chiral Twins / 美沙芬——手性双生子]
Dextromethorphan (右美沙芬, DXM) and Levomethorphan (左美沙芬) are mirror-image molecules with wildly different effects — a fact that fascinates Muggle-born potioneers.

Dextromethorphan (右美沙芬):
- A common Muggle cough suppressant (止咳药), available over the counter in syrups and tablets. At therapeutic doses it is mundane and harmless.
- At high doses ("Robotripping"), DXM produces dose-dependent dissociative plateaus — from mild euphoria and music enhancement to full out-of-body experiences rivalling ketamine.
- Magical effects at therapeutic dose: negligible. A wizard with a cold can safely take cough syrup and cast normally.
- Magical effects at recreational dose: similar to ketamine but with a distinctive "layered" quality. The wizard perceives magic as having visible depth — enchantments appear as stacked translucent sheets rather than solid constructs. This occasionally provides genuine insight into complex ward structures, which is why some Curse-Breakers at Gringotts have quietly experimented with it (Bill Weasley has opinions on this but won't share them).
- DXM + Pepperup Potion is a known bad combination — serotonin syndrome risk. The steam from the ears turns acrid and yellow.
- Hogwarts students occasionally smuggle Muggle cough syrup for recreational use. Madam Pomfrey has learned to recognise the signs ("Why does this child smell of artificial cherry and why are their pupils the size of Galleons?").

Levomethorphan (左美沙芬):
- The left-handed mirror image. A powerful opioid analgesic — strictly controlled in both Muggle and wizarding worlds.
- Magical effects: profound. Opioids dampen the "pain signal" that normally limits magical exertion. A wizard on levomethorphan can push past their natural magical limits — casting spells of a power level normally beyond their ability — but at the cost of severe magical and physical damage afterward.
- This mirrors how opioids allow Muggles to ignore injury signals. The wizard feels no magical fatigue until the drug wears off, at which point the accumulated debt hits all at once. Magical exhaustion collapse, core destabilisation, and in extreme cases, permanent loss of magical ability.
- The chiral irony is not lost on Muggle-born wizards: one mirror image is a harmless cough remedy; the other can burn out your magical core. Snape, if he knew about this, would undoubtedly use it as a lecture on the importance of molecular chirality in potion-brewing ("Five points from Gryffindor for not understanding enantiomers").

[Interactions with Potions]
- Mixing psychotropic medications with magical potions is poorly studied and dangerous.
- Pepperup Potion + stimulants = risk of hypertensive crisis and magical overload (steam from ears becomes scalding).
- Calming Draught + benzodiazepines = profound sedation; the wizard may sleep for 24–48 hours and be unrousable by Rennervate.
- Felix Felicis + any psychotropic = unpredictable. The "luck" potion seems to route around the medication's effects in some cases and amplify them in others. No pattern has been established.
- Wolfsbane Potion is unaffected by Muggle medications — lycanthropy operates on a different substrate entirely.
</addon>
"""

[statusBar]
rule = """
If the character is taking any psychotropic medication, track it in the status bar:
- Show medication name, dose, and time since last dose
- Note any active magical side effects (e.g. "Patronus dimmed", "Wand jitter", "Occlumency softened")
- Track withdrawal status if medication was recently stopped
"""

[memory]
rules = """
- Always remember which psychotropic medications the character is currently taking, including dose and duration.
- Track medication compliance — did the character take their dose today?
- Note any magical side effects that manifested during the scene.
- Record any potion-medication interactions that occurred.
"""
