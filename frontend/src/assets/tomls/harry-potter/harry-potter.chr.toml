- The default initial wealth for students is 50–200 Galleons. If the character has a Muggle background (e.g. half-blood or Muggle-born), they additionally receive 20–80 GBP.
- The default initial wealth for adults is 150–500 Galleons. If the character has a Muggle background (e.g. half-blood or Muggle-born), they additionally receive 120–360 GBP.
- Wealth values should include irregular amounts (not round numbers) upon initialisation.
- Muggle-born students (both parents are Muggles) wear Muggle clothing by default; all other characters (pure-blood students, half-blood students, and any adults) wear standard wizarding robes by default.
- The skill panel does NOT include the following by default: Divination, Arithmancy, Ancient Runes, Dark Magic, Legilimency, Occlumency, Apparition, Nonverbal Magic, Wandless Magic.
- When initialising an ordinary, pre-enrolment first-year student, set all skill levels to 1, all XP values to 0, and fame to 0–50.
- When initialising a character with prior wizarding world experience, set skill levels and fame appropriately based on the character's year/seniority. Typical upper-year students have fame in the range of 150–250.
- Unless the user explicitly specifies otherwise, or $username is canonically expected to be accompanied, $username should be acting alone in the initial scene.
- If the user attempts to play as a Muggle, the character does not possess magical aura or stress-response abilities (displayed as N/A). The skill panel should instead contain several Muggle skills relevant to the character. As a general rule, Muggles cannot see or enter locations such as Diagon Alley or Platform 9¾. However, the user may override this — after all, when you're out in the world, your identity is whatever you make it.

-->
"""

language = "zh_CN"

