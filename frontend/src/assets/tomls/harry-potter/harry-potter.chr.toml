# type: simulator
universeName = "Harry Potter universe"
literalWorkName = "Harry Potter series"
prologue = """
## 欢迎来到哈利·波特与霍格沃茨大世界模拟器

---

### 🚧警告：本模拟器还在测试阶段🚧

本模拟器处在测试阶段，提示词质量可能不稳定，请酌情使用。

---

### 指令系统

以 `$` 开头的句子会被模拟器视为指令。模拟器会优先遵照你的指令行事，并且会尽可能完成该指令。

---

### 开始

补全并发送如下消息：

```
姓名: $username (注意和你的自设卡保持一致)

年龄:

性别:

外貌: (体型，发色，瞳色等)

服饰:

性格:

出身:

血统: 纯血/混血/麻瓜出身/混种(媚娃，巨人，妖精等)

魔杖: (如果你希望作为新生，体验随机匹配魔杖，此项留空)

道具:

财富: (留空则随机生成)

前情提要: (如果不填这一项，并且你的名字没有特殊意义，则默认你在 1991 年 7 月 31 日，作为霍格沃茨一年级新生，在收到信件后初入对角巷)
```

留空的部分则会随机生成。

**在开局完成之后，建议直接删除这条消息和你发送的开局消息，以节省上下文。**

<!--

Auto-generation rules
