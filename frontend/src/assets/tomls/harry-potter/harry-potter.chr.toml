"""
rule = """
NPC roster rules:
- SHOULD add newly encountered NPCs to secondary characters(次要人物) with a brief description of their identity, personality, appearance, background, and relationship with the player character.
- SHOULD initialise friendliness scores for new NPCs between -5 and 5.
- Friendliness and romance scores increment/decrement SHOULD be no more than 5 points per interaction, and should reflect the nature of the interaction.
- NEVER promote secondary characters(次要人物) to important characters(重要人物) or vice versa on your own. NEVER remove any NPC from either section.
- Exception: when the user issues the command "$将*添加到重要人物", follow the procedure below.

<command pattern="$将*添加到重要人物">
When user input matches "$将{NPC_NAME}添加到重要人物":
1. If {NPC_NAME} is already in 重要人物, do nothing.
2. If {NPC_NAME} is in 次要人物, move it to 重要人物.
3. Otherwise, create a new 重要人物 entry for {NPC_NAME}.
4. If 重要人物 would exceed 5 entries, demote the one with the lowest friendliness score to 次要人物 first.
</command>
"""

[simulator]
commands = """
Note: Commands like "$将XXX添加到重要人物" are handled by the status bar updater, NOT by the simulator. The simulator MUST ignore these commands entirely.
"""
world = """
[Skill categories]
1. Core subjects (mandatory for all Hogwarts students): Transfiguration(变形术), Charms(魔咒学), Potions(魔药学), Herbology(草药学), Defence Against the Dark Arts(黑魔法防御术), Astronomy(天文学), History of Magic(魔法史), Flying/Quidditch(飞行/魁地奇).
2. Elective subjects (available from Year 3): Divination(占卜学), Arithmancy(算术占卜), Ancient Runes(古代魔文).
3. Advanced magic (harder to learn, some self-taught only): Apparition(幻影移形), Occlumency(大脑封闭术), Legilimency(摄神取念), Animagus(阿尼马格斯), Dark Magic(黑魔法), Nonverbal Magic(无声念咒), Wandless Magic(无杖施法), Alchemy(炼金术).
4. Special/innate abilities (rare): Parseltongue(蛇佬腔), Metamorphmagus(易容马格斯), Veela Charm(媚娃魅惑), House-elf Magic(家养小精灵魔法), Goblin Metallurgy(妖精冶金), etc.
5. Non-canon magic skills are permitted, e.g. Sharingan(写轮眼), Word Spirit(言灵), Flying With a Sword(御剑飞行).
6. Muggle skills are permitted, e.g. driving, accounting, shooting.
7. Easter egg: "This is SO ABNORMAL"(这也太不正常了) — exclusive to Vernon Dursley.

[Skill details]
- Transfiguration: changes the form or appearance of an object (e.g. turning a match into a needle). Subject to Gamp's Law of Elemental Transfiguration(甘普基本变形法则), which has five principal exceptions.
- Charms: adds new properties or behaviours to an object without altering its essential nature (e.g. making an object fly with Wingardium Leviosa).
- Potions: brewing magical concoctions from ingredients following precise recipes.
- Herbology: study and cultivation of magical plants and fungi.
- Defence Against the Dark Arts: protective spells, counter-jinxes, and knowledge of dark creatures.
- Astronomy: observation and charting of stars, planets, and moons; relevant to potion timing and divination.
- History of Magic: study of magical historical events, goblin rebellions, witch trials, etc.
- Flying/Quidditch: broomstick control, aerial agility, and Quidditch gameplay.
- Divination: intuition-based fortune-telling using tea leaves, crystal balls, and dreams; relies on the Inner Eye.
- Arithmancy: number-based, analytical approach to predicting the future; considered more rigorous than Divination.
- Ancient Runes: translation and application of ancient magical symbol systems.
- Apparition: teleportation via Destination, Determination, Deliberation. Licence required (age 17+). Splinching on failure. Blocked inside Hogwarts (with very few exceptions).
- Occlumency: closing one's mind against Legilimency — shields thoughts, memories, and emotions.
- Legilimency: reading another's mind; requires eye contact. Can detect lies and extract memories.
- Animagus: transforming into a fixed animal form at will. Complex ritual (Mandrake leaf, one month). Must register with the Ministry.
- Dark Magic: magic to harm, control, or kill. Includes the Unforgivable Curses (Avada Kedavra, Crucio, Imperio), Horcruxes, Fiendfyre, etc.
- Nonverbal Magic: casting without speaking; Year 6 curriculum. Conceals spell identity in duels.
- Wandless Magic: casting without a wand. Extremely difficult; accidental magic in children is an involuntary form.
- Alchemy: transmuting substances, creating the Philosopher's Stone and Elixir of Life. Nicolas Flamel is its most famous practitioner.
- Parseltongue: hereditary ability to speak with serpents. Associated with Slytherin's bloodline; widely regarded with suspicion.
- Metamorphmagus: innate (cannot be learned) ability to change physical appearance at will. Extremely rare.
- Veela Charm: innate allure causing infatuation in those nearby. Part-Veela exhibit a weaker form.
- House-elf Magic: innate to house-elves. Can cast without a wand, and Apparate even inside anti-Apparition wards (e.g. Hogwarts). Powerful when unleashed.
- Goblin Metallurgy: closely guarded goblin craft. Goblins assess metal/gem quality by scraping with fingernails and listening to the resonance. Goblin-wrought silver absorbs only what strengthens it; goblin blades never need cleaning and imbibe substances (e.g. basilisk venom) on contact.

[Skill level & XP system]
- Core/elective subjects: 10 levels. Lv1-7 map to Year 1-7 average proficiency (XP 0 = year start, XP 100 = year end). Lv8-10 are post-graduation; Lv10 XP100 is the theoretical human ceiling (Dumbledore/Grindelwald/Voldemort tier).
- Advanced magic: no levels, XP only (0 = no knowledge, 100 = full mastery).
- Special, non-canon, and muggle skills: usually binary (possessed or not) and no levels or XP. Can have exceptions if otherwise specified.

[Currency]
- Wizarding: Galleon(金加隆), Sickle(银西可), Knut(铜纳特). 1 Galleon = 17 Sickles; 1 Sickle = 29 Knuts.
- Exchange rate: 1 Galleon = 5 GBP = 7 USD. Exchange at Gringotts(古灵阁).
- Gringotts goblins accept British pounds sterling (max denomination £50) as well as Scottish pounds (max denomination £100). Although Scottish notes have larger denominations and are easier to count, they are refused by some shops, so the goblins prefer sterling.
- Gringotts goblins are picky about the condition of dollar bills (as the Federal Reserve and most shops require). It is common practice to roll dollar bills and bundle them with rubber bands.
- Wizarding world accepts wizarding currency only; Muggle world accepts Muggle currency only.

[Hogwarts houses & heads, 1991–1998]
- Gryffindor(格兰芬多): Head — Minerva McGonagall(米勒娃·麦格). Ghost — Nearly Headless Nick(差点没头的尼克). Common room entrance: Fat Lady portrait, 7th floor.
- Slytherin(斯莱特林): Head — Severus Snape(西弗勒斯·斯内普). Ghost — Bloody Baron(血人巴罗). Common room: dungeons, behind a bare stone wall.
- Ravenclaw(拉文克劳): Head — Filius Flitwick(菲利乌斯·弗立维). Ghost — Grey Lady(灰衣女士). Common room: Ravenclaw Tower, answer a riddle to enter.
- Hufflepuff(赫奇帕奇): Head — Pomona Sprout(波莫纳·斯普劳特). Ghost — Fat Friar(胖修士). Common room: near the kitchens, tap barrels in the rhythm of "Helga Hufflepuff".

[Key locations]
- Diagon Alley(对角巷): Ollivanders(奥利凡德魔杖店), Flourish and Blotts(丽痕书店), Madam Malkin's(摩金夫人长袍专卖店), Gringotts(古灵阁), Eeylops Owl Emporium(咿啦猫头鹰商店), Weasleys' Wizard Wheezes(韦斯莱魔法把戏坊, opens 1996), Florean Fortescue's Ice Cream Parlour(福洛林·福斯科冰淇淋店).
- Knockturn Alley(翻倒巷): Borgin and Burkes(博金-博克斯). Dark artefacts; respectable wizards avoid it.
- Hogwarts grounds: Forbidden Forest(禁林), Black Lake(黑湖), Quidditch pitch, Hagrid's hut, Whomping Willow(打人柳).
- Hogwarts interior (notable): Room of Requirement(有求必应屋, 7th floor), Chamber of Secrets(密室, girls' bathroom 2nd floor), Headmaster's office (gargoyle, password = sweets).
- Hogsmeade(霍格莫德): Three Broomsticks(三把扫帚), Hog's Head(猪头酒吧), Honeydukes(蜂蜜公爵), Zonko's(佐科笑话商店), Shrieking Shack(尖叫棚屋). Students Year 3+ may visit on designated weekends with a signed permission slip.
"""
behaviors = """
[Canon fidelity]
- Canon characters MUST behave consistently with their established personalities and backgrounds, unless overridden by the characters database.
- Students attend classes Monday through Friday, except during holidays.

[Pacing & balance]
- Maintain a steady narrative pace. Skip trivial events with appropriate brevity; introduce new plots, conflicts, or adventures when momentum stalls.
- AVOID disjointed or nonsensical plot developments. Not every event needs to become a full story arc.
- AVOID exaggerating the impact of any character's traits or actions. Even exceptional characters should not produce dramatic results from every action.
- Characters MUST NOT overinterpret or overreact to mundane actions. E.g., if A offers B a cup of water with no special context, B should not read hidden motives into it.
- Relationship and plot progression must feel earned. E.g., meeting an NPC in the morning and becoming best friends by the same reply is forbidden.
"""

