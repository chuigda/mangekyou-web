# type: simulator
#
# === 顶层字段 ===

# 世界观的名称，用于在系统提示词中告诉 LLM "你在模拟哪个世界"。
# 例如 "Harry Potter universe"、"Middle-earth"。
universeName = "My Universe"

# 原作作品名，用于提示 LLM 参考哪部作品的设定来保持一致性。
# 例如 "Harry Potter series"、"The Lord of the Rings"。
literalWorkName = "My Original Work"

# 开场白/序言。用户打开这个模拟器时，会在聊天面板中看到这段文字。
# 通常包含：欢迎语、使用说明、指令系统介绍、角色创建模板等。
# 支持 Markdown 格式。可以用 HTML 注释 <!-- --> 写入仅供 LLM 阅读的隐藏规则。
prologue = """
## 欢迎来到示例模拟器

在这里写你的开场白。

### 开始

补全并发送如下消息来创建你的角色：

```
姓名:
年龄:
性别:
```

<!--

这里可以填入一些仅供 LLM 阅读，且仅在开场时使用的规则或提示。

-->
"""

# 模拟器的输出语言。决定 LLM 用什么语言回复，以及输出长度的计量单位。
# 可选值: "en" (English) | "zh_CN" (简体中文)
language = "zh_CN"

#
# === [statusBar] 状态栏配置 ===
# 状态栏会在每次交互后由一个独立的 LLM 调用来更新，用于追踪世界状态。
#
[statusBar]

# 状态栏的格式模板。LLM 会按照这个模板来填充/更新状态栏内容。
# 用 {placeholder} 标记需要 LLM 动态填写的字段。
# 支持 Markdown 格式。
format = """
### 当前场景

日期: {YYYY-MM-dd} | 时间: {time} | 天气: {weather}
地点: {location}
在场角色: {characters}

---

### 人物属性

姓名: {name} | 年龄: {age} | 性别: {gender}
技能: [ {skills} ]

---

### 物品栏

{items}
"""

# 状态栏更新规则。告诉负责更新状态栏的 LLM 在更新时应遵守哪些规则。
# 例如：NPC 好感度每次变化不超过 5 点、何时添加/移除角色等。
rule = """
- 新遇到的 NPC 应添加到次要人物列表中。
- 好感度每次交互变化不超过 5 点。
"""

# 状态栏的额外自定义段落。会被追加到状态栏更新提示词中。
# 用于添加格式模板和规则之外的补充信息。
# sections = ""

#
# === [simulator] 模拟器核心配置 ===
# 这些字段会被注入到主模拟器的系统提示词中，控制 LLM 的行为。
#
[simulator]

# 额外任务。追加到 LLM 的核心任务列表中。
# 用于定义这个模拟器特有的职责，例如 "追踪玩家的魔法等级"。
# tasks = ""

# 指令/命令定义。定义玩家可以使用的 $ 指令。
# 例如 "$查看地图"、"$将某人添加到重要人物" 等。
commands = """
<command pattern="$查看地图">显示当前区域的地图和可前往的地点。</command>
<command pattern="$查看技能">显示玩家角色的详细技能列表。</command>
"""

# 世界设定。描述这个世界的规则、体系、货币、地理、阵营等。
# LLM 会参考这些设定来保持世界观的一致性。
world = """
在这里描述你的世界设定。

货币体系: ...
地理位置: ...
魔法/科技体系: ...
重要组织/阵营: ...
"""

# 角色数据库。预定义的重要 NPC 信息。
# LLM 在遇到这些角色时会参考此处的设定。
# characters = ""

# 额外数据库段落。用于补充 characters 之外的结构化数据。
# 例如物品数据库、技能树、怪物图鉴等。
# database = ""

# 行为准则。指导 LLM 在叙事时应遵循的风格和原则。
# 例如：保持原作风格、控制节奏、NPC 行为逻辑等。
behaviors = """
- 严格遵循原作设定，不随意编造与原作矛盾的内容。
- 保持叙事节奏，避免在单次回复中推进过多剧情。
- NPC 应有自己的动机和行为逻辑，不应无条件配合玩家。
"""

# 禁止事项。明确告诉 LLM 不能做的事情。
# 例如：不能让玩家角色死亡、不能出现某些内容等。
# prohibitions = ""

# 额外自定义段落。会被追加到模拟器系统提示词的末尾。
# 用于添加以上字段都无法归类的补充内容。
# sections = ""

#
# === [memory] 记忆摘要器配置 ===
# 控制 LLM 如何对历史对话进行摘要，以便在上下文窗口有限时保留关键信息。
#
[memory]

# 记忆摘要规则。告诉摘要器在压缩历史时应遵守哪些规则。
# 例如：必须保留哪些关键信息、摘要的详细程度等。
rules = """
- 必须保留所有重要的剧情转折点。
- 必须保留 NPC 好感度的关键变化。
- 必须保留玩家获得或失去的重要物品。
"""

# 额外自定义段落。追加到记忆摘要器提示词中。
# sections = ""
