# type: addon
#
# === 附加模组 (Addon) ===
# Addon 用于在不修改主模拟器的情况下，向模拟器追加额外的设定、规则或世界观内容。
# 多个 addon 可以同时叠加使用。addon 中的每个字段都会被合并到主模拟器对应的字段中。
# 所有字段均为可选——只写你需要追加的部分即可。

# 模组名称，用于在 UI 中标识此 addon。可选，不填则显示为"附加 #N"。
name = "示例模组"

#
# === [statusBar] 状态栏追加配置 ===
# 这里的内容会被合并到主模拟器的状态栏配置中。
#
[statusBar]

# 追加的状态栏更新规则。会与主模拟器的 statusBar.rule 合并。
# 用于为新增的世界观元素添加状态栏更新逻辑。
# rule = ""

# 追加的状态栏自定义段落。会与主模拟器的 statusBar.sections 合并。
# sections = ""

#
# === [simulator] 模拟器追加配置 ===
# 这里的内容会被合并到主模拟器的系统提示词中。
#
[simulator]

# 追加的额外任务。会与主模拟器的 simulator.tasks 合并。
# 用于为 addon 引入的新系统定义 LLM 需要执行的额外职责。
# tasks = ""

# 追加的指令/命令。会与主模拟器的 simulator.commands 合并。
# 用于定义 addon 引入的新 $ 指令。
# commands = ""

# 追加的世界设定。会与主模拟器的 simulator.world 合并。
# 这是 addon 最常用的字段——用于向世界观中注入新的设定体系。
# 建议用 <addon id="..."> 标签包裹，便于识别来源。
world = """
<addon id="example">
在这里描述 addon 追加的世界设定。

例如：一个新的魔法体系、一个新的地区、一个新的种族等。
所有写在这里的内容都会成为模拟器世界观的一部分。
</addon>
"""

# 追加的角色数据库。会与主模拟器的 simulator.characters 合并。
# 用于添加 addon 相关的预定义 NPC。
# characters = ""

# 追加的额外数据库段落。会与主模拟器的 simulator.database 合并。
# database = ""

# 追加的行为准则。会与主模拟器的 simulator.behaviors 合并。
# 用于为 addon 内容定义额外的叙事规则。
# behaviors = ""

# 追加的禁止事项。会与主模拟器的 simulator.prohibitions 合并。
# prohibitions = ""

# 追加的自定义段落。会与主模拟器的 simulator.sections 合并。
# sections = ""

#
# === [memory] 记忆摘要器追加配置 ===
# 这里的内容会被合并到主模拟器的记忆摘要器配置中。
#
[memory]

# 追加的记忆摘要规则。会与主模拟器的 memory.rules 合并。
# 用于确保 addon 引入的关键信息在摘要时不会丢失。
# rules = ""

# 追加的自定义段落。会与主模拟器的 memory.sections 合并。
# sections = ""
