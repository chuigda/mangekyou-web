# type: player
#
# === 玩家角色卡 ===
# 玩家角色卡定义了"你是谁"。一个玩家卡可以搭配不同的模拟器使用。
# 玩家卡的字段会被注入到模拟器的系统提示词中，让 LLM 知道玩家角色的信息。

# 玩家角色的名字。会在提示词中作为 PC (Player Character) 的名称使用。
# LLM 会用这个名字来称呼玩家角色。
playerName = "示例角色"

# 角色设定。描述这个角色的详细信息，会被注入到系统提示词的角色数据库部分。
# 可以包含：外貌、性格、背景故事、能力、装备、人际关系等。
# 如果留空，则角色信息完全由模拟器开场时的用户输入决定。
settings = """
在这里描述你的角色设定。

外貌: ...
性格: ...
背景: ...
特殊能力: ...
"""
